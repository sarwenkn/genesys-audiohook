server {
    listen 80;
    server_name audiohook.yourcompany.com;

    # Health check endpoint (plain HTTP is fine; TLS will be added by certbot)
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        # The backend uses `websockets` and expects an HTTP/1.1 request line.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # WebSocket AudioHook endpoint
    location = /audiohook {
        proxy_pass http://127.0.0.1:8080/audiohook;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;

        # Important for long-running calls
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Temporary debug UI (protect with DEBUG_UI_TOKEN on the server)
    location = /debug {
        proxy_pass http://127.0.0.1:8080/debug;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # Debug WS stream (protect with DEBUG_UI_TOKEN on the server)
    location = /debug/ws {
        proxy_pass http://127.0.0.1:8080/debug/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
