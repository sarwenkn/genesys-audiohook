server {
    listen 80;
    server_name audiohook.yourcompany.com;

    # Health check endpoint (plain HTTP is fine; TLS will be added by certbot)
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
    }

    # WebSocket AudioHook endpoint
    location = /audiohook {
        proxy_pass http://127.0.0.1:8080/audiohook;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;

        # Important for long-running calls
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

