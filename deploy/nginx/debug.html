<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AudioHook Debug</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; max-height: 45vh; overflow: auto; }
    .muted { color: #666; }
    input { padding: 6px 8px; min-width: 360px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #f3f4f6; font-size: 12px; margin-left: 8px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 980px) { .split { grid-template-columns: 1fr; } }
    .log {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 45vh;
      overflow: auto;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px;
      line-height: 1.35;
    }
    .line { padding: 2px 0; }
    .final { color: #111; }
    .partial { color: #666; }
    .meta { color: #888; margin-right: 6px; }
  </style>
</head>
<body>
  <h2>AudioHook Debug</h2>
  <div class="row">
    <div class="card">
      <div>
        <b>Status</b>: <span id="status" class="muted">idle</span>
        <span class="pill">events: <span id="evtCount">0</span></span>
        <span class="pill">last: <span id="lastMsg">-</span></span>
      </div>
      <div style="margin-top:8px"><b>Token</b>: <input id="token" placeholder="paste DEBUG_UI_TOKEN" /></div>
      <div style="margin-top:8px"><b>Filter session</b>: <input id="sessionFilter" placeholder="optional session id" /></div>
      <div style="margin-top:8px"><button id="connectBtn">Connect</button></div>
    </div>
    <div class="card">
      <div><b>Tip</b>: keep this page open during a Genesys test call.</div>
      <div class="muted">Disable debug UI after testing.</div>
    </div>
  </div>
  <h3>Transcripts</h3>
  <div class="split">
    <div class="card">
      <div>
        <b>Customer</b> <span class="muted">(channel 0)</span>
        <span class="pill">lines: <span id="custCount">0</span></span>
      </div>
      <div id="customerLog" class="log" aria-label="Customer transcripts"></div>
    </div>
    <div class="card">
      <div>
        <b>Agent</b> <span class="muted">(channel 1)</span>
        <span class="pill">lines: <span id="agentCount">0</span></span>
      </div>
      <div id="agentLog" class="log" aria-label="Agent transcripts"></div>
    </div>
  </div>
  <h3>Events</h3>
  <pre id="events"></pre>

  <script>
    const statusEl = document.getElementById('status');
    const eventsEl = document.getElementById('events');
    const customerLogEl = document.getElementById('customerLog');
    const agentLogEl = document.getElementById('agentLog');
    const sessionFilterEl = document.getElementById('sessionFilter');
    const tokenEl = document.getElementById('token');
    const connectBtn = document.getElementById('connectBtn');
    const evtCountEl = document.getElementById('evtCount');
    const lastMsgEl = document.getElementById('lastMsg');
    const custCountEl = document.getElementById('custCount');
    const agentCountEl = document.getElementById('agentCount');

    let evtCount = 0;
    let custLines = 0;
    let agentLines = 0;
    let ws = null;

    const partialElBySide = { customer: null, agent: null };

    function appendPre(el, line) {
      el.textContent += line + "\n";
      el.scrollTop = el.scrollHeight;
    }

    function sideFromPayload(p) {
      // Preferred mapping: always channel 0 => customer, channel 1 => agent.
      // Fall back to speaker when channel isn't present.
      const ch = (p && (p.channel ?? p.channelId));
      if (ch === 0 || ch === "0") return "customer";
      if (ch === 1 || ch === "1") return "agent";
      const sp = String(p?.speaker || "").toLowerCase();
      if (sp === "customer") return "customer";
      if (sp === "agent") return "agent";
      return null;
    }

    function appendTranscript(side, tsIso, text, isFinal) {
      const container = side === "customer" ? customerLogEl : agentLogEl;
      const countEl = side === "customer" ? custCountEl : agentCountEl;

      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = `[${tsIso}]`;

      const msg = document.createElement('span');
      msg.className = isFinal ? 'final' : 'partial';
      msg.textContent = text || '';

      if (!isFinal) {
        // Update "live" partial line in place for this side.
        let line = partialElBySide[side];
        if (!line) {
          line = document.createElement('div');
          line.className = 'line partial';
          line.appendChild(meta);
          line.appendChild(msg);
          container.appendChild(line);
          partialElBySide[side] = line;
          if (side === "customer") custLines += 1; else agentLines += 1;
          countEl.textContent = String(side === "customer" ? custLines : agentLines);
        } else {
          line.innerHTML = '';
          line.appendChild(meta);
          line.appendChild(msg);
        }
      } else {
        // Final transcript: replace existing partial (if any) or append a new line.
        const existing = partialElBySide[side];
        const line = existing || document.createElement('div');
        line.className = 'line final';
        line.innerHTML = '';
        line.appendChild(meta);
        line.appendChild(msg);
        if (!existing) {
          container.appendChild(line);
          if (side === "customer") custLines += 1; else agentLines += 1;
          countEl.textContent = String(side === "customer" ? custLines : agentLines);
        }
        partialElBySide[side] = null;
      }

      container.scrollTop = container.scrollHeight;
    }

    function connect() {
      const wsProto = (location.protocol === 'https:') ? 'wss' : 'ws';
      const token = (new URLSearchParams(location.search).get('token') || tokenEl.value || '').trim();
      if (!token) {
        statusEl.textContent = 'missing token';
        return;
      }
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        try { ws.close(1000, "reconnect"); } catch {}
      }
      const wsUrl = `${wsProto}://${location.host}/debug/ws?token=${encodeURIComponent(token)}`;
      statusEl.textContent = 'connecting...';
      ws = new WebSocket(wsUrl);

      ws.onopen = () => { statusEl.textContent = 'connected'; };
      ws.onclose = (ev) => {
        statusEl.textContent = `closed (${ev.code}${ev.reason ? `: ${ev.reason}` : ''})`;
      };
      ws.onerror = () => { statusEl.textContent = 'error'; };

      ws.onmessage = (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        evtCount += 1;
        evtCountEl.textContent = String(evtCount);
        lastMsgEl.textContent = new Date().toLocaleTimeString();
        const sessionFilter = (sessionFilterEl.value || '').trim();
        const sid = msg?.payload?.session_id || msg?.payload?.id || '';
        if (sessionFilter && sid && sid !== sessionFilter) return;

        const ts = new Date((msg.ts || Date.now()/1000) * 1000).toISOString();
        if (msg.type === 'transcript') {
          const p = msg.payload || {};
          const side = sideFromPayload(p) || "customer";
          appendTranscript(side, ts, p.text || '', Boolean(p.is_final));
        }
        appendPre(eventsEl, `[${ts}] ${msg.type} ${JSON.stringify(msg.payload || {})}`);
      };
    }

    connectBtn.addEventListener('click', connect);
    // Auto-connect when token is present in query string.
    if (new URLSearchParams(location.search).get('token')) connect();
  </script>
</body>
</html>
